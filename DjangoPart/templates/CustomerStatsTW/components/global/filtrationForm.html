<div id="formBlock" class="hidden">
    <div class="absolute top-0 left-0 w-full h-full z-9 bg-black opacity-30" onclick="toggleVisibility()"></div>
    <div class="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 z-10 bg-gray-800 px-5 pb-5 pt-2 rounded-lg flex flex-col">
        <button onclick="toggleVisibility()" class="p-2 -mr-3 cursor-pointer self-end">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-3 h-3" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="1" y1="1" x2="13" y2="13" />
                <line x1="13" y1="1" x2="1" y2="13" />
            </svg>
        </button>
        <form method="get" class="flex flex-col gap-4" onsubmit="validateFilterForm(this); return removeEmptyInputs(this)">
            <div>
                <p class="font-semibold">Фільтр за датою:</p>
                <div class="mt-1 flex gap-2 items-center">
                    {{ form.start_date }}
                    {{ form.end_date }}
                </div>
            </div>
            <div>
                <p class="font-semibold">Фільтр за назвою відео:</p>
                <div class="mt-1 flex gap-2 items-center">
                   {{ form.search }}
                </div>
            </div>
            <div>
                <p class="font-semibold">Фільтр за об'ємом:</p>
                <div class="mt-1 flex gap-2 items-center">
                    {{ form.min_volume }}
                    {{ form.max_volume }}
                </div>
            </div>
            <div>
                <p class="font-semibold">Фільтр за ціною:</p>
                <div class="mt-1 flex gap-2 items-center">
                    {{ form.min_price }}
                    {{ form.max_price }}
                </div>
            </div>
            <button type="submit" class="btn-style self-start">Фільтрувати</button>
        </form>
    </div>
</div>
